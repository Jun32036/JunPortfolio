  <link rel="stylesheet" href="style.css">
  <style>
    /* Hero */
    .hero {
      padding: 6.5rem 1.5rem 3rem;
      text-align: center;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse at center, rgba(198, 153, 90, 0.06) 0%, transparent 65%);
      pointer-events: none;
    }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 400;
      color: var(--text-1);
      line-height: 1.1;
      opacity: 0;
      animation: fadeUp 0.7s var(--transition) 0.2s forwards;
    }

    .hero-name-en {
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 300;
      color: var(--text-3);
      letter-spacing: 0.2em;
      margin-bottom: 1.2rem;
    }

    .hero-role {
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.06em;
      margin-bottom: 0.8rem;
    }

    /* About Grid */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0.8rem;
    }

    .about-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.3rem;
      transition: all 0.4s var(--transition);
    }

    .about-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }

    .about-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.8rem;
    }

    .about-icon svg {
      width: 18px;
      height: 18px;
      stroke-width: 1.5;
      fill: none;
    }

    .about-card h3 {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-1);
      margin-bottom: 0.3rem;
    }

    .about-card p {
      font-size: 0.88rem;
      color: var(--text-2);
      line-height: 1.6;
      font-weight: 300;
    }

    @media (max-width: 760px) {
      .about-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 640px) {
      .hero-name { font-size: 2.5rem; }
      .section-title { font-size: 1.45rem; }
      .about-grid { grid-template-columns: 1fr; }
    }

    @media print {
      .about-grid { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>
