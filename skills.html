<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Jun-You Ye — Skills">
<title>Jun-You Ye — Skills</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FBFAF8; --bg-elevated: #FFFFFF; --bg-subtle: #F5F3EF;
    --bg-glass: rgba(255,255,255,0.65); --text-1: #171717; --text-2: #4A4A4A;
    --text-3: #8C8C8C; --accent: #1B2A3D; --accent-soft: #2D4A6A;
    --gold: #C6995A; --gold-light: rgba(198,153,90,0.12);
    --border: #E8E5DF; --border-light: #F0EDE8; --radius: 14px;
    --shadow-md: 0 4px 20px rgba(0,0,0,0.05), 0 1px 4px rgba(0,0,0,0.03);
    --shadow-hover: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
    --transition: cubic-bezier(0.22, 1, 0.36, 1);
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Noto Sans TC', 'Outfit', sans-serif; font-weight: 400; color: var(--text-1); background: var(--bg); line-height: 1.65; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

  nav { position: fixed; top: 0; width: 100%; z-index: 100; transition: all 0.4s var(--transition); }
  nav.scrolled { background: var(--bg-glass); backdrop-filter: blur(20px) saturate(1.4); -webkit-backdrop-filter: blur(20px) saturate(1.4); border-bottom: 1px solid rgba(0,0,0,0.04); }
  .nav-inner { max-width: 960px; margin: 0 auto; padding: 0 1.5rem; display: flex; justify-content: space-between; align-items: center; height: 52px; }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.15rem; color: var(--accent); letter-spacing: 0.03em; font-weight: 600; text-decoration: none; }
  .nav-links { display: flex; gap: 0.3rem; list-style: none; }
  .nav-links a { text-decoration: none; color: var(--text-3); font-family: 'Outfit', sans-serif; font-size: 0.85rem; display: inline-flex; align-items: center; gap: 0.3rem; font-weight: 500; letter-spacing: 0.06em; padding: 0.35rem 0.8rem; border-radius: 100px; transition: all 0.3s var(--transition); }
  .nav-links a svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); background: var(--gold-light); }

  .page-header { padding: 5.5rem 1.5rem 2.5rem; text-align: center; position: relative; }
  .page-header::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 600px; height: 400px; background: radial-gradient(ellipse at center, rgba(198,153,90,0.06) 0%, transparent 65%); pointer-events: none; }
  .page-header-title { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-weight: 400; color: var(--text-1); opacity: 0; animation: fadeUp 0.7s var(--transition) 0.2s forwards; }

  .cta-primary { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.55rem 1.3rem; background: var(--accent); color: #fff; border-radius: 100px; text-decoration: none; font-size: 0.88rem; font-weight: 500; letter-spacing: 0.03em; transition: all 0.35s var(--transition); }
  .cta-primary:hover { background: var(--accent-soft); box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .cta-primary svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  .container { max-width: 820px; margin: 0 auto; padding: 0 1.5rem; }
  section { padding: 2.5rem 0; }
  .section-label { display: inline-flex; align-items: center; gap: 0.5rem; font-family: 'Outfit', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
  .section-label svg { width: 14px; height: 14px; stroke: var(--gold); fill: none; stroke-width: 1.5; flex-shrink: 0; }
  .section-label::before { content: ''; width: 16px; height: 1.5px; background: var(--gold); }
  .section-title { font-family: 'Playfair Display', serif; font-size: 1.75rem; font-weight: 400; color: var(--text-1); margin-bottom: 1.8rem; }

  .card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; transition: all 0.4s var(--transition); }
  .card:hover { box-shadow: var(--shadow-hover); border-color: var(--border-light); transform: translateY(-2px); }

  .skills-row { display: flex; gap: 0.6rem; flex-wrap: wrap; }
  .skill-chip { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.45rem 0.9rem; border-radius: 100px; font-size: 0.84rem; font-weight: 400; transition: all 0.3s var(--transition); }
  .skill-chip svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; flex-shrink: 0; }
  .skill-chip.current { background: var(--accent); color: #fff; border: 1px solid var(--accent); }
  .skill-chip.learning { background: var(--bg-elevated); color: var(--text-2); border: 1px solid var(--border); }
  .skill-chip.learning::before { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--gold); animation: pulse 2s ease infinite; }
  @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

  .skill-group { display: flex; align-items: flex-start; gap: 1rem; padding: 0.75rem 0; }
  .skill-group:first-child { padding-top: 0; }
  .skill-group:last-child { padding-bottom: 0; }
  .skill-group-label { font-family: 'Noto Sans TC', sans-serif; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em; color: var(--text-3); width: 52px; flex-shrink: 0; padding-top: 0.45rem; }
  .skill-group-divider { height: 1px; background: var(--border-light); }

  footer { text-align: center; padding: 2rem 1.5rem 2.5rem; }
  .footer-line { width: 24px; height: 1.5px; background: var(--gold); margin: 0 auto 0.8rem; }
  .footer-name { font-family: 'Playfair Display', serif; font-size: 0.95rem; color: var(--accent); margin-bottom: 0.25rem; }
  .footer-copy { font-size: 0.78rem; color: var(--text-3); letter-spacing: 0.05em; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .reveal { opacity: 0; transform: translateY(20px); transition: opacity 0.65s var(--transition), transform 0.65s var(--transition); }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal.d1 { transition-delay: 0.06s; }

  @media (max-width: 640px) { .page-header-title { font-size: 2.2rem; } .skills-row { justify-content: center; } .nav-links a { font-size: 0.78rem; padding: 0.3rem 0.5rem; } }
  .hamburger { display: none; cursor: pointer; background: none; border: none; padding: 0.5rem; min-width: 40px; min-height: 40px; align-items: center; justify-content: center; flex-direction: column; }
  .hamburger span { display: block; width: 22px; height: 2.5px; background: var(--text-1); margin: 3px 0; border-radius: 2px; transition: 0.3s; }
  @media (max-width: 480px) {
    .nav-links { display: none; }
    .nav-links.open { display: flex; flex-direction: column; position: absolute; top: 52px; left: 0; width: 100%; background: var(--bg-elevated); backdrop-filter: blur(20px); padding: 1rem 1.5rem; gap: 0.3rem; border-bottom: 1px solid var(--border-light); box-shadow: var(--shadow-md); z-index: 100; }
    .hamburger { display: flex; }
  }
  @media print { nav, footer, .hamburger { display: none; } .reveal { opacity: 1 !important; transform: none !important; } .skill-chip.learning::before { animation: none; } body { background: #fff; } }
</style>
</head>

  </div>
</nav>

<script>
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => { nav.classList.toggle('scrolled', window.scrollY > 20); }, { passive: true });
  const observer = new IntersectionObserver((entries) => { entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); }); }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
  const cur = location.pathname.split('/').pop() || 'index.html';
  document.querySelectorAll('.nav-links a[href]').forEach(a => { if (a.getAttribute('href') === cur) a.classList.add('active'); });
</script>
