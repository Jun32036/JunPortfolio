  <style>
    /* Card */
    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      transition: all 0.4s var(--transition);
    }

    .card:hover {
      box-shadow: var(--shadow-hover);
      border-color: var(--border-light);
      transform: translateY(-2px);
    }

    /* Skills */
    .skills-row {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .skill-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.9rem;
      border-radius: 100px;
      font-size: 0.84rem;
      font-weight: 400;
      transition: all 0.3s var(--transition);
    }

    .skill-chip svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      flex-shrink: 0;
    }

    .skill-chip.current {
      background: var(--accent);
      color: #fff;
      border: 1px solid var(--accent);
    }

    .skill-chip.learning {
      background: var(--bg-elevated);
      color: var(--text-2);
      border: 1px solid var(--border);
    }

    .skill-chip.learning::before {
      content: '';
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }

    /* Skill Groups */
    .skill-group {
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      padding: 0.75rem 0;
    }

    .skill-group:first-child { padding-top: 0; }
    .skill-group:last-child  { padding-bottom: 0; }

    .skill-group-label {
      font-family: 'Noto Sans TC', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      color: var(--text-3);
      width: 52px;
      flex-shrink: 0;
      padding-top: 0.45rem;
    }

    .skill-group-divider {
      height: 1px;
      background: var(--border-light);
    }

    @media (max-width: 640px) {
      .skills-row { justify-content: center; }
    }

    @media print {
      .skill-chip.learning::before { animation: none; }
    }
  </style>
</head>
